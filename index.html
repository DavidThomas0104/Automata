<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFA Tracer Visualizer</title>
    <meta name="description" content="A premium animated Deterministic Finite Automaton visualization tool.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="glass-header">
            <h1>DFA <span>Tracer</span></h1>
            <p>Interactive State Machine Visualizer</p>
            <select id="dfa-selector" class="dfa-dropdown">
                <option value="0">DFA 1 — (bab+bbb)ab(a*+b*)(ba)(aba)(bab+aba)bb(a+b)(bab+aba)(a+b)</option>
                <option value="1">DFA 2 — (1+0)(101+01+000)(1+0)(101+00)(111+00+101)(1+0)</option>
            </select>
        </header>

        <!-- Regex Display -->
       

        <div id="validity-banner" class="banner"></div>

        <!-- Main Visualization Area -->
        <main id="main-area">
            <div id="graph-container">
                <!-- SVG dynamically injected here by D3 -->
            </div>
        </main>

        <!-- CFG/PDA Sidebar -->
        <div id="cfg-pda-sidebar" class="cfg-pda-sidebar">
            <button class="sidebar-close-btn" id="sidebar-close-btn" title="Close">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="cfg">CFG</button>
                <button class="sidebar-tab" data-tab="pda">PDA</button>
            </div>
            <div id="cfg-content" class="sidebar-content active">
                <h3 class="sidebar-section-title">Context-Free Grammar</h3>
                <div id="cfg-rules" class="cfg-rules"></div>
            </div>
            <div id="pda-content" class="sidebar-content">
                <h3 class="sidebar-section-title">Pushdown Automaton</h3>
                <div id="pda-diagram-container" class="pda-diagram-container"></div>
                <div id="pda-transitions" class="pda-transitions"></div>
            </div>
        </div>

        <!-- Control Panel -->
        <section class="glass-panel control-panel">
            <div class="input-container">
                <div class="input-group">
                    <label for="binary-input">Input String</label>
                    <input type="text" id="binary-input" placeholder="e.g. babbbb" autocomplete="off">
                    <span class="validation-message" id="validation-msg">Only valid characters are allowed.</span>
                </div>
                <div class="status-group">
                    <div class="status-item">State: <span id="current-state-display" class="highlight-text">q0</span></div>
                    <div class="status-item string-display">
                        Remaining: <span id="remaining-input-display" class="highlight-text"></span>
                    </div>
                </div>
            </div>
            
            <div class="history-container">
                <span class="history-label">History:</span>
                <div id="history-display" class="history-content"></div>
            </div>

            <div class="controls">
                <button id="step-btn" class="btn primary-btn" title="Step through one character">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    Step
                </button>
                <button id="play-btn" class="btn secondary-btn" title="Animate sequence automatically">
                    <svg id="play-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg id="pause-icon" style="display:none;" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    <span id="play-text">Play</span>
                </button>
                <div class="speed-control">
                    <label for="speed-slider">Speed</label>
                    <input type="range" id="speed-slider" min="100" max="2000" value="800" step="100" title="Animation Speed">
                </div>
                <button id="reset-btn" class="btn text-btn" title="Reset everything to q0">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                <button id="cfg-pda-btn" class="btn cfg-pda-toggle-btn" title="Show CFG & PDA">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M17.5 17.5l2.5 2.5M20 17.5l-2.5 2.5"/></svg>
                    CFG &amp; PDA
                </button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
